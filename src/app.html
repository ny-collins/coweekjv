<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="KJV Reader" />
    
    <link rel="icon" href="/favicon/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <meta property="og:type" content="website">
    <meta property="og:title" content="KJV Reader">
    <meta property="og:description" content="A direct-forward, minimalist King James Version Bible.">
    <meta name="twitter:card" content="summary">

    <script>
      (function() {
        try {
          var isDark = localStorage.getItem('darkMode') === 'true';
          if (isDark) {
            document.documentElement.classList.add('dark-mode');
          }
          var fontSize = localStorage.getItem('fontSize');
          if (fontSize) {
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
          }
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            meta.setAttribute('content', isDark ? '#0c0e14' : '#fcfaf6');
          }
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body>
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
