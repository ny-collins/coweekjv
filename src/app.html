<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Cowee KJV" />
    
    <link rel="icon" href="/favicon/favicon.ico" sizes="any">
    <link rel="icon" href="/favicon/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon/favicon-96x96.png">
    <link rel="manifest" href="/favicon/site.webmanifest">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Cowee KJV">
    <meta property="og:description" content="A direct-forward, minimalist King James Version Bible.">
    <meta name="twitter:card" content="summary">

    <script>
      window.appStartTime = Date.now();
      (function() {
        try {
          var isDark = localStorage.getItem('darkMode') === 'true';
          const savedTheme = localStorage.getItem('selectedTheme');
          if (savedTheme) {
            isDark = (savedTheme === 'dark' || savedTheme === 'slate');
          }
          if (isDark) {
            document.documentElement.classList.add('dark-mode');
          }
          if (savedTheme && savedTheme !== 'light') {
            document.documentElement.classList.add(savedTheme + '-mode');
          }
          var fontSize = localStorage.getItem('fontSize');
          if (fontSize) {
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
          }
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) {
            var themeColor = '#fcfaf6';
            if (savedTheme === 'sepia') themeColor = '#f4ecd8';
            else if (savedTheme === 'slate') themeColor = '#0f172a';
            else if (savedTheme === 'dark' || isDark) themeColor = '#0c0e14';
            meta.setAttribute('content', themeColor);
          }
          // Define global splash dismissal helpers
          window.dismissSplash = function() {
            var splash = document.getElementById('app-splash-screen');
            if (splash) {
              splash.style.opacity = '0';
              setTimeout(function() {
                splash.style.visibility = 'hidden';
                splash.remove();
              }, 300);
            }
          };

          window.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
              var splash = document.getElementById('app-splash-screen');
              if (splash) {
                event.preventDefault();
                window.dismissSplash();
              }
            }
          });

          // Set CSS custom properties on document element instantly to prevent splash flashing
          var bg = '#fcfaf6';
          var tc = '#2c2a29';
          if (savedTheme === 'sepia') { bg = '#f4ecd8'; tc = '#5c4033'; }
          else if (savedTheme === 'slate') { bg = '#0f172a'; tc = '#cbd5e1'; }
          else if (savedTheme === 'dark' || isDark) { bg = '#0c0e14'; tc = '#e2e8f0'; }
          document.documentElement.style.setProperty('--splash-bg', bg);
          document.documentElement.style.setProperty('--splash-tc', tc);
        } catch (e) {}
      })();
    </script>
    %sveltekit.head%
  </head>
  <body>
    <!-- Instant PWA Splash Screen -->
    <div id="app-splash-screen" style="
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: var(--splash-bg, #fcfaf6);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      opacity: 1;
      visibility: visible;
      transition: opacity 0.3s ease, visibility 0.3s;
    ">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="splash-logo-title" style="width: 110px; height: 110px; animation: splashPulse 2s infinite ease-in-out;">
        <title id="splash-logo-title">Cowee KJV Monogram Logo</title>
        <defs>
          <linearGradient id="splash-gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#fbbf24" />
            <stop offset="50%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#b45309" />
          </linearGradient>
        </defs>
        <path d="M 380 132 A 180 180 0 1 0 380 380" stroke="url(#splash-gold-grad)" stroke-width="24" stroke-linecap="round" fill="none" />
        <path d="M 256 190 Q 210 160 160 180 L 160 315 Q 210 295 256 325 Z" fill="url(#splash-gold-grad)" opacity="0.15" />
        <path d="M 256 190 Q 210 160 160 180 L 160 315 Q 210 295 256 325" stroke="url(#splash-gold-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M 256 190 Q 302 160 352 180 L 352 315 Q 302 295 256 325 Z" fill="url(#splash-gold-grad)" opacity="0.15" />
        <path d="M 256 190 Q 302 160 352 180 L 352 315 Q 302 295 256 325" stroke="url(#splash-gold-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <line x1="256" y1="190" x2="256" y2="325" stroke="url(#splash-gold-grad)" stroke-width="12" stroke-linecap="round" />
        <path d="M 256 220 Q 220 195 180 210" stroke="url(#splash-gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
        <path d="M 256 220 Q 292 195 332 210" stroke="url(#splash-gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
        <path d="M 256 250 Q 220 225 180 240" stroke="url(#splash-gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
        <path d="M 256 250 Q 292 225 332 240" stroke="url(#splash-gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
        <path d="M 256 280 Q 220 255 180 270" stroke="url(#splash-gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
        <path d="M 256 280 Q 292 255 332 270" stroke="url(#splash-gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
      </svg>
      <h2 style="
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        color: var(--splash-tc, #2c2a29);
        font-size: 1.35rem;
        font-weight: 700;
        margin-top: 1.25rem;
        letter-spacing: -0.02em;
        transition: color 0.3s;
      ">Cowee KJV</h2>
      <!-- Premium Progress Bar -->
      <div id="splash-progress-track" style="
        width: 140px;
        height: 3px;
        background-color: rgba(245, 158, 11, 0.15);
        border-radius: 2px;
        margin-top: 1.5rem;
        overflow: hidden;
        position: relative;
        transition: background-color 0.3s;
      ">
        <div id="splash-progress-bar" style="
          position: absolute;
          top: 0;
          left: 0;
          height: 100%;
          background: linear-gradient(to right, #fbbf24, #f59e0b);
          width: 0%;
          border-radius: 2px;
          animation: splashProgress 2.5s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        "></div>
      </div>
      
      <!-- Subtle Skip Button (Not attracting attention, ESC key bound) -->
      <button id="splash-skip-btn" onclick="window.dismissSplash()" style="
        position: absolute;
        bottom: 2rem;
        background: transparent;
        border: 1.5px solid currentColor;
        color: var(--splash-tc, #2c2a29);
        opacity: 0.5;
        padding: 0.4rem 1.1rem;
        font-family: 'Outfit', system-ui, -apple-system, sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        border-radius: 8px;
        cursor: pointer;
        transition: opacity 0.2s, transform 0.2s, background-color 0.2s, color 0.3s, box-shadow 0.2s;
      ">
        Skip
      </button>

      <style>
        @keyframes splashPulse {
          0%, 100% { transform: scale(1); opacity: 0.9; }
          50% { transform: scale(1.03); opacity: 1; filter: drop-shadow(0 0 12px rgba(245, 158, 11, 0.35)); }
        }
        @keyframes splashProgress {
          0% { width: 0%; }
          100% { width: 100%; }
        }
        #splash-skip-btn:hover {
          opacity: 0.85 !important;
          transform: scale(1.04);
          background-color: rgba(245, 158, 11, 0.08);
        }
        #splash-skip-btn:focus-visible {
          opacity: 0.9 !important;
          outline: 2px solid #f59e0b;
          outline-offset: 3px;
        }
        #splash-skip-btn:active {
          transform: scale(0.96);
        }
      </style>
    </div>
    <div id="svelte">%sveltekit.body%</div>
  </body>
</html>
