<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <!-- Gold Gradient for Monogram and Pages -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="50%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>

  <!-- Background rounded rectangle (for app icons) -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)" />

  <!-- Outer crescent forming the letter 'C' -->
  <path d="M 380 132 A 180 180 0 1 0 380 380" stroke="url(#gold-grad)" stroke-width="24" stroke-linecap="round" fill="none" />

  <!-- Inner Open Book -->
  <!-- Left Page -->
  <path d="M 256 190 Q 210 160 160 180 L 160 315 Q 210 295 256 325 Z" fill="url(#gold-grad)" opacity="0.15" />
  <path d="M 256 190 Q 210 160 160 180 L 160 315 Q 210 295 256 325" stroke="url(#gold-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
  
  <!-- Right Page -->
  <path d="M 256 190 Q 302 160 352 180 L 352 315 Q 302 295 256 325 Z" fill="url(#gold-grad)" opacity="0.15" />
  <path d="M 256 190 Q 302 160 352 180 L 352 315 Q 302 295 256 325" stroke="url(#gold-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />

  <!-- Book Spine -->
  <line x1="256" y1="190" x2="256" y2="325" stroke="url(#gold-grad)" stroke-width="12" stroke-linecap="round" />

  <!-- Page lines details -->
  <path d="M 256 220 Q 220 195 180 210" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
  <path d="M 256 220 Q 292 195 332 210" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
  
  <path d="M 256 250 Q 220 225 180 240" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
  <path d="M 256 250 Q 292 225 332 240" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />

  <path d="M 256 280 Q 220 255 180 270" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
  <path d="M 256 280 Q 292 255 332 270" stroke="url(#gold-grad)" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.75" />
</svg>